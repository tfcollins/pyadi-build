name: Self-Hosted Full Test Suite

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: selfhosted-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on:
      - self-hosted
      - linux
      - x64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install nox
        run: python -m pip install --upgrade pip nox

      - name: Run linters
        run: nox -s lint

  docs:
    name: Docs
    runs-on:
      - self-hosted
      - linux
      - x64
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install nox
        run: python -m pip install --upgrade pip nox

      - name: Build documentation
        run: nox -s docs

  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on:
      - self-hosted
      - linux
      - x64
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install nox
        run: python -m pip install --upgrade pip nox

      - name: Run mocked unit tests
        run: nox -s tests-${{ matrix.python-version }}

      - name: Run example tests
        run: nox -s test_examples-${{ matrix.python-version }}

  real-build-tests:
    name: Real Build Tests (${{ matrix.platform }})
    runs-on:
      - self-hosted
      - linux
      - x64
    strategy:
      fail-fast: false
      matrix:
        platform: ["zynq", "zynqmp", "microblaze", "boot", "noos"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install nox
        run: python -m pip install --upgrade pip nox

      - name: Run real build tests
        run: nox -s "tests_real_platform-3.11(platform='${{ matrix.platform }}')"

  real-vivado-docker:
    name: Real Vivado Docker Install Test
    runs-on:
      - self-hosted
      - linux
      - x64
    env:
      AMD_USERNAME: ${{ secrets.AMD_USERNAME }}
      AMD_PASSWORD: ${{ secrets.AMD_PASSWORD }}
      ADIBUILD_VIVADO_DOCKER_VERSION: ${{ vars.ADIBUILD_VIVADO_DOCKER_VERSION || '2023.2' }}
      ADIBUILD_VIVADO_DOCKER_CACHE_DIR: ${{ vars.ADIBUILD_VIVADO_DOCKER_CACHE_DIR }}
      ADIBUILD_KEEP_VIVADO_DOCKER_ARTIFACTS: ${{ vars.ADIBUILD_KEEP_VIVADO_DOCKER_ARTIFACTS || '0' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install nox
        run: python -m pip install --upgrade pip nox

      - name: Verify AMD credentials are configured
        run: |
          test -n "$AMD_USERNAME"
          test -n "$AMD_PASSWORD"

      - name: Run Docker-backed Vivado install test
        run: nox -s tests_real_vivado_docker
